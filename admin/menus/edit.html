<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 수정 - 카페 관리자</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="edit.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">☕ 카페 관리자</div>
      <nav class="admin-sidebar__nav">
        <a href="../index.html">📊 대시보드</a>
        <a href="list.html" class="active">📋 메뉴 관리</a>
        <a href="../orders/list.html">🧾 주문 관리</a>
        <a href="../../index.html">🏠 고객 사이트로</a>
      </nav>
    </aside>

    <div class="admin-content">
    <main class="page-container">
    <a href="list.html" class="back-link">← 메뉴 목록으로</a>
    <h1 class="form-title">메뉴 수정</h1>

    <p class="not-found" id="notFound" hidden>메뉴를 찾을 수 없습니다.</p>

    <form class="menu-form" id="menuForm">
      <div class="form-group">
        <label for="name">메뉴 이름</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="category">카테고리</label>
        <select id="category" name="category" required></select>
      </div>

      <div class="form-group">
        <label for="price">가격</label>
        <input type="number" id="price" name="price" min="0" step="100" required>
      </div>

      <div class="form-group">
        <label for="image">이미지 URL</label>
        <input type="text" id="image" name="image" placeholder="선택 사항">
        <div class="image-preview" id="imagePreview" hidden></div>
      </div>

      <div class="form-group">
        <label for="description">설명</label>
        <textarea id="description" name="description" rows="4"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="list.html" class="btn btn-sm">취소</a>
      </div>
    </form>
    </main>
    </div>
  </div>

  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="edit.js"></script>
</body>
</html>
