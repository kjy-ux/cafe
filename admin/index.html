<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 - 카페 관리자</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">☕ 카페 관리자</div>
      <nav class="admin-sidebar__nav">
        <a href="index.html" class="active">📊 대시보드</a>
        <a href="menus/list.html">📋 메뉴 관리</a>
        <a href="orders/list.html">🧾 주문 관리</a>
      </nav>
    </aside>

    <div class="admin-content">
    <main class="page-container">
    <h1 class="page-title">대시보드</h1>

    <section class="stat-grid">
      <div class="stat-card">
        <span class="stat-card__label">전체 메뉴</span>
        <span class="stat-card__value" id="statMenus">0개</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">전체 주문</span>
        <span class="stat-card__value" id="statOrders">0건</span>
      </div>
      <div class="stat-card stat-card--accent">
        <span class="stat-card__label">대기중 주문</span>
        <span class="stat-card__value" id="statPending">0건</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">총 매출</span>
        <span class="stat-card__value" id="statRevenue">0원</span>
      </div>
    </section>

    <section class="shortcut-grid">
      <a href="menus/list.html" class="shortcut-card">📋 메뉴 관리</a>
      <a href="orders/list.html" class="shortcut-card">🧾 주문 관리</a>
    </section>

    <section class="recent-orders">
      <div class="recent-orders__header">
        <h2>최근 주문</h2>
        <a href="orders/list.html">전체보기 →</a>
      </div>
      <div class="order-table-wrap">
        <table class="order-table">
          <thead>
            <tr>
              <th>주문번호</th>
              <th>일시</th>
              <th>내역</th>
              <th>금액</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="recentOrdersBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" hidden>
        <span class="empty-state__icon" aria-hidden="true">📭</span>
        <p class="empty-state__title">주문 내역이 없습니다</p>
      </div>
    </section>
    </main>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="index.js"></script>
</body>
</html>
