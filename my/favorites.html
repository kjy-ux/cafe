<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 메뉴 - 카페</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="site-header__brand">☕ 카페</a>
    <nav class="site-nav">
      <a href="../menus/list.html">메뉴</a>
      <a href="index.html">마이페이지</a>
      <a href="../basket/list.html">장바구니<span class="cart-badge" id="cartBadge" hidden>0</span></a>
      <a href="../orders/list.html">주문내역</a>
    </nav>
    <div class="auth-nav" id="authNav"></div>
  </header>

  <main class="page-container">
    <a href="index.html" class="back-link">← 마이페이지로</a>
    <h1 class="page-title">나만의 메뉴</h1>
    <p class="page-subtitle">찜한 메뉴와 저장해둔 나만의 레시피를 한 곳에서 확인하세요.</p>

    <div class="my-favorites-page">
      <section class="my-favorites">
        <div class="my-recent__header">
          <h2>찜한 메뉴</h2>
          <a href="../menus/list.html">메뉴 보러가기 →</a>
        </div>
        <div class="menu-grid" id="favoriteGrid"></div>
        <div class="empty-state" id="favoriteEmptyState" hidden>
          <span class="empty-state__icon" aria-hidden="true">🤍</span>
          <p class="empty-state__title">아직 찜한 메뉴가 없습니다</p>
        </div>
      </section>

      <section class="my-recipes">
        <div class="my-recent__header">
          <h2>내 레시피</h2>
        </div>
        <div class="recipe-list" id="recipeList"></div>
        <div class="empty-state" id="recipeEmptyState" hidden>
          <span class="empty-state__icon" aria-hidden="true">🧪</span>
          <p class="empty-state__title">아직 저장한 레시피가 없습니다</p>
          <p class="empty-state__desc">메뉴 상세 페이지에서 나만의 조합을 만들고 저장해보세요</p>
        </div>
      </section>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="favorites.js"></script>
</body>
</html>
