<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장바구니 - 카페</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="list.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="site-header__brand">☕ 카페</a>
    <nav class="site-nav">
      <a href="../menus/list.html">메뉴</a>
      <a href="../my/index.html">마이페이지</a>
      <a href="list.html" class="active">장바구니<span class="cart-badge" id="cartBadge" hidden>0</span></a>
      <a href="../orders/list.html">주문내역</a>
    </nav>
    <div class="auth-nav" id="authNav"></div>
  </header>

  <main class="page-container">
    <h1 class="page-title">장바구니</h1>

    <div class="basket-layout">
      <div class="basket-list" id="basketList"></div>

      <aside class="basket-summary" id="basketSummary" hidden>
        <div class="basket-summary__total">
          <span>총 금액</span>
          <span id="totalPrice">0원</span>
        </div>
        <button class="btn btn-primary btn-block" id="orderBtn">주문하기</button>
      </aside>
    </div>

    <div class="empty-state" id="emptyState" hidden>
      <span class="empty-state__icon" aria-hidden="true">🛒</span>
      <p class="empty-state__title">장바구니가 비어 있습니다</p>
      <p class="empty-state__desc">마음에 드는 메뉴를 담아보세요</p>
      <a href="../menus/list.html" class="btn btn-primary">메뉴 보러 가기</a>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
